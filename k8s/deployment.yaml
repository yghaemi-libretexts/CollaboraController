apiVersion: apps/v1
kind: Deployment
metadata:
  name: collabora-controller
  namespace: default
  labels:
    app: collabora-controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app: collabora-controller
  template:
    metadata:
      labels:
        app: collabora-controller
    spec:
      serviceAccountName: collabora-controller
      containers:
      - name: collabora-controller
        image: collabora-controller:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: PORT
          value: "3000"
        - name: COLLABORA_SERVICE
          value: "collabora"
        - name: COLLABORA_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: password
              optional: true
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: access-key-id
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: secret-access-key
              optional: true
        - name: AWS_REGION
          value: "us-east-1"
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: collabora-controller-secrets
              key: api-key
              optional: true
        - name: API_SECRET
          valueFrom:
            secretKeyRef:
              name: collabora-controller-secrets
              key: api-secret
              optional: true
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: collabora-controller-service
  namespace: default
  labels:
    app: collabora-controller
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: collabora-controller
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: collabora-controller
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: collabora-controller
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: collabora-controller
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: collabora-controller
subjects:
- kind: ServiceAccount
  name: collabora-controller
  namespace: default
